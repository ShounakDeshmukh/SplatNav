bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    filter_duration: 0.3
    odom_topic: /j100/platform/odom/filtered

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.5
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    publish_zero_velocity: true
    odom_topic: /j100/platform/odom/filtered
    odom_duration: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35
      stateful: True
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      min_vel_x: 0.0
      max_vel_x: 0.45
      max_vel_theta: 1.0
      vx_samples: 20
      vtheta_samples: 40

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.25
      use_astar: false

smoother_server:
  ros__parameters:
    smoother_plugins: ["smoother"]
    smoother:
      plugin: "nav2_constrained_smoother::ConstrainedSmoother"
      w_cost: 0.015
      w_curve: 30.0
      minimum_turning_radius: 0.4

behavior_server:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.2
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

waypoint_follower:
  ros__parameters:
    loop_rate: 20

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.35
      footprint_padding: 0.03
      track_unknown_space: false
      publish_frequency: 2.0
      update_frequency: 5.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera
        camera:
          topic: /j100/sensors/camera_0/depth/points
          data_type: PointCloud2
          marking: true
          clearing: true
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.55
        cost_scaling_factor: 2.5

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link
      rolling_window: false
      width: 30
      height: 30
      resolution: 0.1
      robot_radius: 0.35
      track_unknown_space: true
      publish_frequency: 1.0
      update_frequency: 1.0
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: camera
        camera:
          topic: /j100/sensors/camera_0/depth/points
          data_type: PointCloud2
          marking: true
          clearing: true
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.6
        cost_scaling_factor: 2.0